repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep this in sync with the ruff version uv resolves in `uv.lock`.
    # CI runs `uv run ruff format --check`, which uses the lockfile version;
    # if pre-commit pins an older ruff, formatting can pass locally and fail
    # in CI on later releases that evolved formatting heuristics.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: mixed-line-ending
        args: [--fix=lf]
